<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outlook for Linux - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 0 24px;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 24px;
      color: #fff;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #999;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>No internet connection</h1>
    <p>Waiting for your connection to resume.<br>Outlook will load automatically.</p>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener("online", function () {
      window.location.href = "https://outlook.office.com";
    });
  </script>
</body>
</html>
